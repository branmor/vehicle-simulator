<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSP - Dashboard de Progreso</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --muted: #94a3b8;
            --primary: #667eea; --primary-hover: #5568d3; --success: #48bb78;
            --border: #334155; --shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; padding: 20px; background: var(--card); border-radius: 12px; box-shadow: var(--shadow); }
        h1 { font-size: 2rem; margin-bottom: 5px; background: linear-gradient(90deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats { display: flex; justify-content: center; gap: 20px; margin-top: 15px; flex-wrap: wrap; }
        .stat-box { background: #0f172a; padding: 10px 20px; border-radius: 8px; min-width: 120px; text-align: center; border: 1px solid var(--border); }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 0.8rem; color: var(--muted); }
        .progress-bar-container { background: var(--card); height: 12px; border-radius: 6px; margin: 20px 0; overflow: hidden; box-shadow: var(--shadow); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), #48bb78); width: 0%; transition: width 0.5s ease; }
        .phase { background: var(--card); border-radius: 10px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
        .phase-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); }
        .phase-header:hover { background: rgba(255,255,255,0.05); }
        .phase-title { font-weight: 600; font-size: 1.1rem; }
        .phase-meta { font-size: 0.8rem; color: var(--muted); }
        .phase-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; padding: 0 15px; }
        .phase-content.open { max-height: 500px; padding: 10px 15px 20px; }
        .task { display: flex; align-items: center; gap: 10px; margin: 8px 0; cursor: pointer; }
        .task input { accent-color: var(--success); width: 18px; height: 18px; cursor: pointer; }
        .task label { flex: 1; cursor: pointer; user-select: none; }
        .task input:checked + label { text-decoration: line-through; color: var(--muted); }
        .controls { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        button { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-reset { background: #ef4444; color: white; }
        .btn-reset:hover { background: #dc2626; }
        .btn-save { background: var(--success); color: white; }
        .btn-save:hover { background: #38a169; }
        @media (max-width: 600px) { .stats { flex-direction: column; align-items: center; } h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 Vehicle Simulator Pro</h1>
            <p>Dashboard de Seguimiento de Progreso</p>
            <div class="stats">
                <div class="stat-box"><div class="stat-value" id="completedCount">0</div><div class="stat-label">Completadas</div></div>
                <div class="stat-box"><div class="stat-value" id="totalCount">0</div><div class="stat-label">Total Tareas</div></div>
                <div class="stat-box"><div class="stat-value" id="percentCount">0%</div><div class="stat-label">Avance Global</div></div>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </header>

        <div id="phasesContainer"></div>

        <div class="controls">
            <button class="btn-reset" onclick="resetProgress()">🗑️ Reiniciar Progreso</button>
            <button class="btn-save" onclick="exportProgress()">📤 Exportar Progreso (JSON)</button>
        </div>
    </div>

    <script>
        const phases = [
            { name: "FASE 0: PREPARACIÓN", time: "Semana 1", tasks: ["Crear repositorio GitHub", "Instalar Node.js LTS (v20+)", "Instalar VS Code + extensión Vue - Official", "Crear proyecto base con Vite + Vue + TS", "Configurar Tailwind CSS", "Instalar y configurar Pinia + Vue Router", "Primer commit y push a GitHub", "Configurar deploy en Vercel"] },
            { name: "FASE 1: CIMIENTOS", time: "Semana 2", tasks: ["Crear store base con Pinia (useVehicleStore)", "Definir tipos TypeScript para vehículo completo", "Implementar motor de cálculo básico", "Crear layout principal con navegación", "Configurar rutas básicas", "Crear página Dashboard", "Implementar sistema de unidades"] },
            { name: "FASE 2: PÁGINAS BASE", time: "Semanas 3-4", tasks: ["Crear página /tires y selectores (llanta, perfil, ancho)", "Cálculo automático de diámetro total", "Visualización 2D del neumático (Canvas)", "Base de datos de neumáticos comunes", "Crear página /differential y selectores", "Cálculo de torque en ruedas", "Crear página /engine y inputs de potencia/curva", "Crear página /transmission y relaciones por marcha"] },
            { name: "FASE 3: INTERCONEXIÓN", time: "Semana 5", tasks: ["Conectar páginas al store Pinia", "Implementar recálculo automático en tiempo real", "Crear tabla de velocidades por marcha", "Gráfico de velocidad vs marcha", "Gráfico de torque en ruedas", "Cálculo de 0-100 km/h", "Cálculo de velocidad máxima", "Cálculo de consumo estimado"] },
            { name: "FASE 4: DASHBOARD AVANZADO", time: "Semana 6", tasks: ["Métricas principales (cards)", "Comparador visual 'Antes vs Después'", "Indicadores de advertencia", "Visualización cadena cinemática animada", "Panel de especificaciones completas"] },
            { name: "FASE 5: FUNCIONES AVANZADAS", time: "Semana 7", tasks: ["Sistema de presets/guardado", "Exportar configuración a JSON", "Importar configuración desde JSON", "Generar reporte PDF", "Compartir configuración vía URL", "Comparador lado a lado"] },
            { name: "FASE 6: VALIDACIÓN Y CALIDAD", time: "Semana 8", tasks: ["Validaciones de combinaciones inviables", "Mensajes de advertencia", "Tests unitarios (Vitest)", "Accesibilidad WCAG AA", "Responsive design", "Optimización de rendimiento", "Documentación completa"] },
            { name: "FASE 7: DESPLIEGUE", time: "Semana 9", tasks: ["Deploy en Vercel", "Dominio personalizado (opcional)", "Video tutorial de uso", "Guía del estudiante (PDF)", "Presentación para profesor", "Backup final en GitHub"] }
        ];

        const STORAGE_KEY = 'vsp_progress_v2';
        let state = {};

        function init() {
            const saved = localStorage.getItem(STORAGE_KEY);
            state = saved ? JSON.parse(saved) : {};
            renderPhases();
            updateStats();
        }

        function renderPhases() {
            const container = document.getElementById('phasesContainer');
            container.innerHTML = '';
            phases.forEach((phase, pIdx) => {
                const phaseDiv = document.createElement('div');
                phaseDiv.className = 'phase';
                let tasksHtml = '';
                phase.tasks.forEach((task, tIdx) => {
                    const id = `task_${pIdx}_${tIdx}`;
                    const checked = state[id] ? 'checked' : '';
                    tasksHtml += `<div class="task"><input type="checkbox" id="${id}" ${checked} onchange="toggleTask('${id}')"><label for="${id}">${task}</label></div>`;
                });
                phaseDiv.innerHTML = `
                    <div class="phase-header" onclick="togglePhase(this)">
                        <div><span class="phase-title">${phase.name}</span></div>
                        <span class="phase-meta">${phase.time} ▾</span>
                    </div>
                    <div class="phase-content">${tasksHtml}</div>
                `;
                container.appendChild(phaseDiv);
            });
        }

        window.togglePhase = (header) => {
            const content = header.nextElementSibling;
            const arrow = header.querySelector('.phase-meta');
            content.classList.toggle('open');
            arrow.textContent = content.classList.contains('open') ? `${header.nextElementSibling.parentElement.querySelector('.phase-meta').textContent.replace('▾','▸')}` : `${header.parentElement.querySelector('.phase-meta').textContent.replace('▸','▾')}`;
        };

        window.toggleTask = (id) => {
            state[id] = !state[id];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            updateStats();
        };

        function updateStats() {
            let total = 0, completed = 0;
            phases.forEach(p => { total += p.tasks.length; });
            Object.values(state).forEach(val => { if(val) completed++; });
            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('percentCount').textContent = `${percent}%`;
            document.getElementById('progressBar').style.width = `${percent}%`;
        }

        window.resetProgress = () => {
            if(confirm('⚠️ ¿Eliminar todo el progreso? Esta acción no se puede deshacer.')) {
                localStorage.removeItem(STORAGE_KEY);
                state = {};
                init();
            }
        };

        window.exportProgress = () => {
            const blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'VSP_Progreso.json'; a.click();
            URL.revokeObjectURL(url);
        };

        init();
    </script>
</body>
</html>
